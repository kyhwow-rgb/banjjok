<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<title>반쪽 - 주선자 대시보드</title>
<link rel="stylesheet" href="css/matchmaker.css">
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
</div>

<div class="navbar">
    <div class="navbar-brand" style="cursor:pointer;">
        <span onclick="location.href='index.html'">반쪽</span>
        <span style="font-size:.65em;font-weight:500;color:var(--muted);margin-left:6px;">주선자</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
        <span class="navbar-email" id="user-email"></span>
        <button class="notif-bell" id="notif-bell" onclick="toggleNotifPanel()">
            <i class="fa-solid fa-bell"></i>
            <span class="notif-badge" id="notif-badge" style="display:none;">0</span>
        </button>
    </div>
</div>

<!-- 알림 패널 -->
<div class="notif-backdrop" id="notif-backdrop" onclick="closeNotifPanel()"></div>
<div class="notif-panel" id="notif-panel">
    <div class="notif-header">
        <span style="font-weight:800;font-size:.95em;">알림</span>
        <button class="btn btn-nav" onclick="markAllRead()" style="font-size:.78em;">모두 읽음</button>
    </div>
    <div id="notif-list"></div>
</div>

<div class="page">

    <!-- TAB: 추천 현황 -->
    <div class="tab-content active" id="tab-participants">
        <div class="section-card">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-users" style="color:var(--primary);"></i> 내 추천 현황</div>
                <span id="participant-count" style="font-size:.78em;font-weight:600;color:var(--primary);"></span>
            </div>
            <div class="section-body" id="participants-list" style="padding:14px 20px;">
                <div class="empty-state">추천한 참가자가 없습니다.<br>추천 코드를 공유해보세요!</div>
            </div>
        </div>

        <!-- 추천 코드 공유 -->
        <div class="section-card" id="referral-share-card">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-share-nodes" style="color:#059669;"></i> 추천 코드</div>
            </div>
            <div class="section-body" style="padding:14px 20px;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <code id="my-referral-code" style="font-size:1.3em;font-weight:800;letter-spacing:2px;color:var(--primary);"></code>
                    <button class="btn btn-outline" onclick="copyReferralCode()" style="font-size:.78em;padding:6px 14px;"><i class="fa-solid fa-copy"></i> 복사</button>
                </div>
                <p style="font-size:.78em;color:var(--muted);margin-top:8px;">이 코드를 지인에게 공유하면 추천인으로 등록됩니다.</p>
            </div>
        </div>
    </div>

    <!-- TAB: 소개하기 -->
    <div class="tab-content" id="tab-introduce">
        <div class="section-card">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-handshake-angle" style="color:#ec4899;"></i> 소개하기</div>
            </div>
            <div class="section-body" style="padding:14px 20px;">
                <div id="intro-form">
                    <p style="font-size:.85em;color:var(--muted);margin-bottom:14px;">내 네트워크에서 소개할 참가자를 선택하면, 어울릴 만한 상대 3명을 추천해드려요.</p>

                    <!-- 소개할 참가자 선택 (내 풀) -->
                    <div class="intro-pick">
                        <label style="font-weight:700;font-size:.88em;"><i class="fa-solid fa-user" style="color:var(--primary);"></i> 소개할 참가자</label>
                        <select id="pick-person-a" class="form-select" onchange="showRecommendations()">
                            <option value="">선택...</option>
                        </select>
                    </div>

                    <!-- 추천 상대 3명 카드 -->
                    <div id="recommendations" style="margin-top:16px;"></div>

                    <!-- 소개 메모 (추천 선택 후 표시) -->
                    <div id="intro-note-area" style="display:none;margin-top:14px;">
                        <label style="font-weight:700;font-size:.88em;">소개 메모 (선택)</label>
                        <textarea id="intro-note" placeholder="두 사람에게 전달할 메모..." rows="2" maxlength="200" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;font-size:.85em;font-family:inherit;resize:vertical;margin-top:6px;"></textarea>
                    </div>

                    <!-- 일일 제한 표시 -->
                    <div id="daily-limit" style="font-size:.75em;color:var(--muted);text-align:center;margin-top:12px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- TAB: 소개 현황 -->
    <div class="tab-content" id="tab-history">
        <div class="section-card">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-clock-rotate-left" style="color:#6366f1;"></i> 소개 현황</div>
                <span id="history-count" style="font-size:.78em;font-weight:600;color:var(--primary);"></span>
            </div>
            <div class="section-body" id="history-list" style="padding:14px 20px;">
                <div class="empty-state">아직 소개한 내역이 없습니다.</div>
            </div>
        </div>
    </div>

    <!-- TAB: MY -->
    <div class="tab-content" id="tab-my">
        <div class="section-card">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-user-gear"></i> 내 정보</div>
            </div>
            <div class="section-body" style="padding:14px 20px;">
                <div id="my-profile-info"></div>
                <div style="margin-top:20px;display:flex;flex-direction:column;gap:8px;">
                    <div id="link-participant-dashboard" style="display:none;">
                        <a href="dashboard.html" style="display:flex;align-items:center;gap:12px;padding:14px;background:#f5f3ff;border-radius:10px;text-decoration:none;color:inherit;transition:background .15s;" onmouseover="this.style.background='#ede9fe'" onmouseout="this.style.background='#f5f3ff'">
                            <i class="fa-solid fa-heart" style="color:var(--primary);font-size:1em;width:24px;text-align:center;"></i>
                            <div><div style="font-weight:600;font-size:.9em;">참가자 대시보드</div><div style="font-size:.75em;color:var(--muted);">내 소개팅 프로필 관리</div></div>
                        </a>
                    </div>
                    <div onclick="doLogout()" style="display:flex;align-items:center;gap:12px;padding:14px;background:#fafafa;border-radius:10px;cursor:pointer;transition:background .15s;" onmouseover="this.style.background='#f3f4f6'" onmouseout="this.style.background='#fafafa'">
                        <i class="fa-solid fa-right-from-bracket" style="color:var(--muted);font-size:1em;width:24px;text-align:center;"></i>
                        <div><div style="font-weight:600;font-size:.9em;">로그아웃</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<div class="site-footer">Designed &amp; Developed by Kang</div>

<!-- 하단 탭 바 -->
<div class="tab-bar" id="tab-bar">
    <div class="tab-item active" onclick="switchTab('participants')" id="tab-btn-participants">
        <i class="fa-solid fa-users"></i>
        <span>추천</span>
    </div>
    <div class="tab-item" onclick="switchTab('introduce')" id="tab-btn-introduce">
        <i class="fa-solid fa-handshake-angle"></i>
        <span>소개</span>
    </div>
    <div class="tab-item" onclick="switchTab('history')" id="tab-btn-history">
        <i class="fa-solid fa-clock-rotate-left"></i>
        <span>현황</span>
    </div>
    <div class="tab-item" onclick="switchTab('my')" id="tab-btn-my">
        <i class="fa-solid fa-user"></i>
        <span>MY</span>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/common.js"></script>
<script src="js/matchmaker.js"></script>
</body>
</html>

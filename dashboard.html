<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<title>반쪽 - 내 대시보드</title>
<style>
    :root {
        --primary:#7c3aed; --primary-light:#ede9fe;
        --female:#ec4899; --female-light:#fce7f3;
        --bg:#f8f7ff; --text:#1f2937; --muted:#6b7280;
        --border:#e5e7eb; --card:#ffffff; --radius:18px;
        --shadow:0 2px 16px rgba(124,58,237,0.06);
        --shadow-hover:0 8px 32px rgba(124,58,237,0.12);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

    /* LOADING */
    #loading-overlay { position:fixed; inset:0; background:rgba(255,255,255,0.85); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; z-index:9999; }
    #loading-overlay.hide { display:none; }
    .spinner { width:40px; height:40px; border:4px solid #ede9fe; border-top-color:var(--primary); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* SKELETON UI */
    .skeleton { position:relative; overflow:hidden; background:#e5e7eb; border-radius:12px; }
    .skeleton::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent); animation:shimmer 1.5s infinite; }
    @keyframes shimmer { 0%{transform:translateX(-100%);} 100%{transform:translateX(100%);} }
    .skeleton-text { height:14px; margin-bottom:8px; border-radius:6px; }
    .skeleton-block { border-radius:16px; margin-bottom:12px; }

    /* SECTION CARDS — fade in */
    .section-card { animation:sectionFadeIn .4s ease both; }
    @keyframes sectionFadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .section-card:nth-child(2) { animation-delay:.1s; }
    .section-card:nth-child(3) { animation-delay:.2s; }
    .section-card:nth-child(4) { animation-delay:.3s; }

    /* MATCH ITEM — fade in */
    .match-item { animation:matchItemIn .3s ease both; transition:all .15s; }
    .match-item:hover { background:#faf5ff; transform:translateX(3px); }
    @keyframes matchItemIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    /* FAV ITEM — animation */
    .fav-item { animation:matchItemIn .3s ease both; transition:background .15s; }
    .fav-item:hover { background:#faf5ff; }

    /* TOAST */
    .toast {
        position:fixed; bottom:80px; left:50%;
        transform:translateX(-50%) translateY(80px);
        padding:14px 24px; border-radius:14px;
        font-size:.88em; font-weight:600; transition:transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s;
        z-index:3000; white-space:nowrap; display:flex; align-items:center; gap:8px;
        box-shadow:0 8px 32px rgba(0,0,0,.18); opacity:0;
    }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
    .toast-success { background:#059669; color:white; }
    .toast-error   { background:#dc2626; color:white; }
    .toast-info    { background:#1f2937; color:white; }

    /* NAVBAR */
    .navbar { background:rgba(255,255,255,.85); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:62px; position:sticky; top:0; z-index:100; border-bottom:1px solid rgba(0,0,0,.06); }
    .navbar-brand { font-size:1.15em; font-weight:800; letter-spacing:-.02em; background:linear-gradient(135deg,#7c3aed,#ec4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; cursor:pointer; }
    .navbar-email { font-size:.8em; color:var(--muted); }
    .btn { padding:10px 20px; border-radius:12px; border:none; cursor:pointer; font-size:.9em; font-family:inherit; font-weight:600; transition:all .15s; }
    .btn-nav { background:transparent; color:var(--muted); padding:8px 14px; font-size:.85em; }
    .btn-nav:hover { background:#f3f4f6; }
    .btn-primary { background:linear-gradient(135deg,#7c3aed,#a855f7); color:white; }
    .btn-primary:hover { opacity:.9; }
    .btn-outline { background:white; color:var(--primary); border:2px solid var(--primary); }

    /* LAYOUT */
    .page { max-width:720px; margin:0 auto; padding:28px 20px 60px; display:flex; flex-direction:column; gap:24px; }
    .section-card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; border:1px solid rgba(0,0,0,.04); transition:box-shadow .2s; }
    .section-card:hover { box-shadow:var(--shadow-hover); }
    .section-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .section-title { font-size:1em; font-weight:800; color:var(--text); letter-spacing:-.01em; }
    .section-title i { margin-right:4px; }
    .section-body { padding:20px 24px; }

    /* SCORE */
    .score-wrap { display:flex; align-items:center; gap:16px; margin-bottom:18px; }
    .score-gem { font-size:2.4em; line-height:1; }
    .score-gem.max { animation:gem-pulse 1.5s ease-in-out infinite; }
    @keyframes gem-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    .score-info { flex:1; }
    .score-pct-text { font-size:1.2em; font-weight:800; color:var(--primary); }
    .score-msg { font-size:.8em; color:var(--muted); margin-top:2px; }
    .score-bar-bg { height:10px; background:#ede9fe; border-radius:10px; overflow:hidden; }
    .score-bar-fill { height:100%; background:linear-gradient(90deg,#7c3aed,#ec4899); border-radius:10px; transition:width .6s ease; }

    /* PROFILE GRID */
    .profile-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
    .profile-item { background:var(--bg); border-radius:12px; padding:12px 14px; }
    .profile-label { font-size:.72em; color:var(--muted); font-weight:600; margin-bottom:3px; }
    .profile-value { font-size:.92em; font-weight:700; color:var(--text); }
    .profile-empty { text-align:center; padding:24px; color:var(--muted); font-size:.9em; }
    .profile-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
    .tag { display:inline-block; padding:4px 12px; border-radius:20px; font-size:.75em; font-weight:700; background:var(--primary-light); color:var(--primary); }

    /* FAVORITES */
    .fav-list { display:flex; flex-direction:column; gap:10px; }
    .fav-item { display:flex; align-items:center; gap:14px; padding:12px; background:var(--bg); border-radius:14px; }
    .fav-photo { width:52px; height:52px; border-radius:12px; object-fit:cover; filter:blur(6px); flex-shrink:0; background:#ede9fe; display:flex; align-items:center; justify-content:center; font-size:22px; overflow:hidden; }
    .fav-photo img { width:100%; height:100%; object-fit:cover; filter:blur(6px); }
    .fav-info { flex:1; }
    .fav-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:4px; }
    .fav-tag { font-size:.7em; color:var(--primary); font-weight:700; background:var(--primary-light); padding:2px 8px; border-radius:8px; }
    .fav-empty { text-align:center; padding:32px; color:var(--muted); font-size:.9em; }
    .btn-unfav { background:none; border:none; cursor:pointer; font-size:1.1em; color:#9ca3af; padding:4px 8px; }
    .btn-unfav:hover { color:#ef4444; }

    /* NO PROFILE PROMPT */
    .no-profile { text-align:center; padding:28px; }
    .no-profile-title { font-size:1em; font-weight:700; margin-bottom:8px; }
    .no-profile-sub { font-size:.85em; color:var(--muted); margin-bottom:20px; }

    .site-footer { text-align:center; padding:28px 16px 80px; color:#c4b5fd; font-size:.72em; letter-spacing:.06em; font-weight:500; }

    /* BOTTOM TAB BAR */
    .tab-bar {
        position:fixed; bottom:0; left:0; right:0; z-index:120;
        background:rgba(255,255,255,.92); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
        border-top:1px solid rgba(0,0,0,.06);
        display:flex; align-items:center; justify-content:space-around;
        height:64px; padding-bottom:env(safe-area-inset-bottom, 0);
    }
    .tab-item {
        display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
        padding:6px 0; cursor:pointer; transition:all .15s; flex:1;
        color:var(--muted); text-decoration:none; -webkit-tap-highlight-color:transparent;
    }
    .tab-item i { font-size:1.25em; transition:transform .2s; }
    .tab-item span { font-size:.65em; font-weight:700; letter-spacing:.02em; }
    .tab-item.active { color:var(--primary); }
    .tab-item.active i { transform:scale(1.15); }
    .tab-item .tab-badge {
        position:absolute; top:2px; right:calc(50% - 18px);
        background:#ef4444; color:white; font-size:.55em; font-weight:800;
        min-width:16px; height:16px; border-radius:8px;
        display:flex; align-items:center; justify-content:center; padding:0 4px;
    }

    /* TAB CONTENT */
    .tab-content { display:none; animation:tabFadeIn .3s ease; }
    .tab-content.active { display:block; }
    @keyframes tabFadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* FULLSCREEN CARD (추천 탭) */
    .discover-card-wrap { min-height:calc(100vh - 190px); display:flex; flex-direction:column; justify-content:center; align-items:center; padding:0 4px; }
    .discover-card-wrap .card-view { max-width:380px; width:100%; }
    .discover-card-wrap .card-photo-area { height:320px; }
    .discover-hint { text-align:center; font-size:.78em; color:var(--muted); margin-top:12px; }

    /* WEIGHT SLIDERS */
    .weight-row { display:flex; flex-direction:column; gap:14px; }
    .weight-item { display:flex; flex-direction:column; gap:6px; }
    .weight-header { display:flex; justify-content:space-between; align-items:center; font-size:.85em; font-weight:700; }
    .weight-pct { color:var(--primary); font-size:.95em; min-width:36px; text-align:right; }
    .weight-bar-wrap { position:relative; }
    input[type="range"].weight-slider {
        width:100%; height:6px; border-radius:6px; appearance:none; -webkit-appearance:none;
        background:#ede9fe; cursor:pointer; outline:none;
    }
    input[type="range"].weight-slider::-webkit-slider-thumb {
        appearance:none; -webkit-appearance:none;
        width:20px; height:20px; border-radius:50%; background:var(--primary);
        box-shadow:0 2px 6px rgba(124,58,237,.35); cursor:pointer;
    }
    .weight-total-row { display:flex; justify-content:space-between; align-items:center; margin-top:4px; }
    .weight-total-text { font-size:.8em; color:var(--muted); }
    .weight-total-num { font-size:.88em; font-weight:800; }
    .weight-total-num.ok { color:#10b981; }
    .weight-total-num.over { color:#ef4444; }

    /* MATCH LIST */
    .match-list { display:flex; flex-direction:column; gap:10px; }
    .match-item { display:flex; align-items:center; gap:14px; padding:12px; background:var(--bg); border-radius:14px; }
    .match-rank { font-size:1.1em; font-weight:900; color:var(--primary); width:28px; text-align:center; flex-shrink:0; }
    .match-photo { width:52px; height:52px; border-radius:12px; object-fit:cover; flex-shrink:0; background:#ede9fe; display:flex; align-items:center; justify-content:center; font-size:22px; overflow:hidden; }
    .match-photo img { width:100%; height:100%; object-fit:cover; filter:blur(6px); }
    .match-info { flex:1; }
    .match-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:4px; }
    .match-tag { font-size:.7em; color:var(--primary); font-weight:700; background:var(--primary-light); padding:2px 8px; border-radius:8px; }
    .match-score-badge { flex-shrink:0; text-align:center; }
    .match-score-num { font-size:1.15em; font-weight:900; color:var(--primary); }
    .match-score-label { font-size:.65em; color:var(--muted); }
    .btn-fav { background:none; border:none; cursor:pointer; font-size:1.3em; padding:4px 6px; line-height:1; flex-shrink:0; transition:transform .15s; }
    .btn-fav:hover { transform:scale(1.2); }
    .match-empty { text-align:center; padding:32px; color:var(--muted); font-size:.9em; }
    .match-no-profile { text-align:center; padding:24px; color:var(--muted); font-size:.88em; }

    /* TIER BADGE (Bumble 스타일) */
    .tier-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 12px; border-radius:20px; font-size:.78em; font-weight:800; letter-spacing:.02em; }
    .tier-diamond  { background:linear-gradient(135deg,#dbeafe,#ede9fe); color:#7c3aed; }
    .tier-sapphire { background:linear-gradient(135deg,#dbeafe,#bfdbfe); color:#2563eb; }
    .tier-emerald  { background:linear-gradient(135deg,#d1fae5,#a7f3d0); color:#059669; }
    .tier-ruby     { background:linear-gradient(135deg,#fce7f3,#fecdd3); color:#e11d48; }
    .tier-bronze   { background:#f3f4f6; color:#9ca3af; }

    /* POPULARITY (아만다 스타일) */
    .popularity-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:14px; font-size:.75em; font-weight:700; background:#fef3c7; color:#d97706; }

    /* CARD VIEW (Tinder 스타일) */
    .card-view { position:relative; width:100%; max-width:340px; margin:0 auto; }
    .profile-card {
        background:white; border-radius:24px; overflow:hidden;
        box-shadow:0 8px 40px rgba(124,58,237,.15);
        transition:transform .3s, opacity .3s;
        animation:cardEnter .35s cubic-bezier(.34,1.56,.64,1);
        touch-action:pan-y; user-select:none; -webkit-user-select:none;
    }
    @keyframes cardEnter { from { opacity:0; transform:scale(.9) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .profile-card.swiping-left { transform:translateX(-120%) rotate(-15deg); opacity:0; }
    .profile-card.swiping-right { transform:translateX(120%) rotate(15deg); opacity:0; }
    .card-photo-area { position:relative; width:100%; height:280px; background:linear-gradient(135deg,#ede9fe,#fce7f3); overflow:hidden; }
    .card-photo-area img { width:100%; height:100%; object-fit:cover; filter:blur(12px) brightness(.88); transform:scale(1.05); }
    .card-photo-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:72px; }
    .card-photo-overlay { position:absolute; bottom:0; left:0; right:0; padding:16px 20px; background:linear-gradient(transparent, rgba(0,0,0,.6)); color:white; }
    .card-age-badge { font-size:1.4em; font-weight:900; }
    .card-mbti { font-size:.85em; font-weight:700; opacity:.9; }
    .card-body { padding:18px 20px; }
    .card-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
    .card-tag { padding:4px 12px; border-radius:16px; font-size:.78em; font-weight:700; background:var(--primary-light); color:var(--primary); }
    .card-icebreaker { background:linear-gradient(135deg,#f5f3ff,#fce7f3); border-radius:12px; padding:12px 14px; margin-bottom:12px; }
    .card-ib-q { font-size:.72em; color:var(--primary); font-weight:700; margin-bottom:4px; }
    .card-ib-a { font-size:.88em; font-weight:600; }
    .card-compat { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
    .card-compat-bar { flex:1; height:6px; background:#ede9fe; border-radius:6px; overflow:hidden; }
    .card-compat-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,#7c3aed,#ec4899); }
    .card-actions { display:flex; justify-content:center; gap:16px; padding:8px 20px 20px; }
    .card-btn { width:56px; height:56px; border-radius:50%; border:none; cursor:pointer; font-size:24px; transition:transform .15s, box-shadow .15s; display:flex; align-items:center; justify-content:center; }
    .card-btn:hover { transform:scale(1.1); }
    .card-btn-pass { background:#f3f4f6; color:#9ca3af; box-shadow:0 2px 10px rgba(0,0,0,.08); }
    .card-btn-like { background:linear-gradient(135deg,#7c3aed,#ec4899); color:white; box-shadow:0 4px 16px rgba(124,58,237,.3); }
    .card-btn-super { background:linear-gradient(135deg,#3b82f6,#06b6d4); color:white; box-shadow:0 4px 16px rgba(59,130,246,.3); }
    .card-counter { text-align:center; font-size:.82em; color:var(--muted); margin-top:8px; }

    /* VIEW TOGGLE */
    .view-toggle { display:flex; gap:4px; background:#f3f4f6; border-radius:10px; padding:3px; }
    .view-toggle-btn { padding:6px 14px; border-radius:8px; border:none; cursor:pointer; font-size:.8em; font-weight:700; background:transparent; color:var(--muted); transition:all .15s; font-family:inherit; }
    .view-toggle-btn.active { background:white; color:var(--primary); box-shadow:0 1px 4px rgba(0,0,0,.1); }

    /* MUTUAL INTEREST */
    .mutual-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:14px; font-size:.72em; font-weight:800; background:linear-gradient(135deg,#fce7f3,#ede9fe); color:#7c3aed; animation:mutual-glow 2s infinite alternate; }
    @keyframes mutual-glow { from{box-shadow:0 0 0 rgba(124,58,237,0);} to{box-shadow:0 0 12px rgba(124,58,237,.25);} }
    .btn-match-request { padding:6px 14px; border-radius:10px; border:none; cursor:pointer; font-size:.78em; font-weight:700; background:linear-gradient(135deg,#f59e0b,#ec4899); color:white; transition:all .15s; font-family:inherit; }
    .btn-match-request:hover { transform:scale(1.05); box-shadow:0 4px 12px rgba(236,72,153,.3); }
    .btn-match-request:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .btn-match-requested { padding:6px 14px; border-radius:10px; border:2px solid #d1d5db; background:white; font-size:.78em; font-weight:700; color:#9ca3af; cursor:default; font-family:inherit; }
    .mutual-section { background:linear-gradient(135deg,#faf5ff,#fdf2f8); border-radius:16px; padding:18px; margin-bottom:20px; border:2px solid #ede9fe; }
    .mutual-title { font-size:.88em; font-weight:800; color:var(--primary); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
    .mutual-item { display:flex; align-items:center; gap:12px; padding:10px; background:white; border-radius:12px; margin-bottom:8px; box-shadow:0 2px 8px rgba(124,58,237,.08); }

    /* CONFETTI */
    .confetti-container { position:fixed; inset:0; pointer-events:none; z-index:9998; overflow:hidden; }
    .confetti { position:absolute; width:10px; height:10px; border-radius:2px; animation:confetti-fall 3s ease-in forwards; }
    @keyframes confetti-fall {
        0% { transform:translateY(-10vh) rotate(0deg); opacity:1; }
        100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
    }

    /* ONBOARDING / WAITING */
    .onboard-overlay { position:fixed; inset:0; background:white; z-index:200; display:flex; align-items:center; justify-content:center; }
    .onboard-content { max-width:420px; width:100%; padding:40px 28px; text-align:center; }
    .onboard-icon { font-size:4em; margin-bottom:20px; animation:onboard-bounce 2s ease infinite; }
    @keyframes onboard-bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .onboard-title { font-size:1.5em; font-weight:900; background:linear-gradient(135deg,#7c3aed,#ec4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:10px; }
    .onboard-sub { font-size:.92em; color:var(--muted); line-height:1.6; margin-bottom:28px; }
    .onboard-steps { text-align:left; margin-bottom:28px; }
    .onboard-step { display:flex; align-items:flex-start; gap:12px; margin-bottom:16px; padding:12px 16px; background:var(--bg); border-radius:14px; }
    .onboard-step-num { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#7c3aed,#ec4899); color:white; font-size:.82em; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .onboard-step-text { font-size:.88em; color:var(--text); font-weight:600; line-height:1.4; }
    .onboard-step-desc { font-size:.78em; color:var(--muted); font-weight:400; margin-top:2px; }
    .onboard-btn { display:inline-block; padding:14px 36px; border-radius:14px; border:none; cursor:pointer; font-size:1em; font-weight:800; font-family:inherit; background:linear-gradient(135deg,#7c3aed,#ec4899); color:white; transition:all .2s; box-shadow:0 8px 24px rgba(124,58,237,.3); }
    .onboard-btn:hover { transform:translateY(-2px); box-shadow:0 12px 32px rgba(124,58,237,.4); }
    .waiting-progress { display:flex; justify-content:center; gap:8px; margin:20px 0; }
    .waiting-dot { width:10px; height:10px; border-radius:50%; background:#ede9fe; animation:dot-pulse 1.4s ease infinite; }
    .waiting-dot:nth-child(2) { animation-delay:.2s; }
    .waiting-dot:nth-child(3) { animation-delay:.4s; }
    @keyframes dot-pulse { 0%,100%{background:#ede9fe;transform:scale(1)} 50%{background:#7c3aed;transform:scale(1.3)} }

    @media(max-width:480px) {
        body { font-size:15px; }
        .profile-grid { grid-template-columns:1fr; }
        .page { padding:20px 14px 80px; }
        .section-body { padding:16px; }
        .btn { font-size:.95em; }
        .match-item { padding:14px 10px; }

    const h = calcHeightScore(candidate.height, candidate.gender);
    const l = candidate.look_score || 50;
    const j = calcJobScore(candidate.job_category);
    const baseScore = (h*(w.height||0) + l*(w.looks||0) + j*(w.job||0)) / total;
    const mbtiCompat = calcMbtiCompat(viewer.mbti, candidate.mbti);
    const mbtiBonus = Math.round((mbtiCompat - 50) / 5);
    return Math.min(100, Math.max(0, Math.round(baseScore + mbtiBonus)));
}

function gemIcon(pct) {
    if (pct >= 96) return { icon:'<i class="fa-solid fa-gem"></i>', filter:'none', cls:'max', color:'#7c3aed' };
    if (pct >= 70) return { icon:'<i class="fa-solid fa-gem"></i>', filter:'none', cls:'', color:'#7c3aed' };
    if (pct >= 45) return { icon:'<i class="fa-solid fa-gem"></i>', filter:'none', cls:'', color:'#a78bfa' };
    if (pct >= 20) return { icon:'<i class="fa-solid fa-gem"></i>', filter:'none', cls:'', color:'#c4b5fd' };
    return { icon:'<i class="fa-solid fa-gem"></i>', filter:'none', cls:'', color:'#d1d5db' };
}

// ── 가중치 슬라이더 (자동 밸런싱) ──
let _lastChanged = null;
function onWeightChange(which) {
    _lastChanged = which;
    let h = parseInt(document.getElementById('w-height').value);
    let l = parseInt(document.getElementById('w-looks').value);
    let j = parseInt(document.getElementById('w-job').value);
    const total = h + l + j;
    // 합계 100%로 자동 조정: 변경한 항목 고정, 나머지 비율 축소
    if (total > 100 && which) {
        const excess = total - 100;
        const others = { height:['w-looks','w-job'], looks:['w-height','w-job'], job:['w-height','w-looks'] }[which];
        const v1 = parseInt(document.getElementById(others[0]).value);
        const v2 = parseInt(document.getElementById(others[1]).value);
        const sum = v1 + v2;
        if (sum > 0) {
            const r1 = Math.max(0, Math.round(v1 - excess * (v1 / sum)));
            const r2 = Math.max(0, 100 - (which==='height'?h:which==='looks'?l:j) - r1);
            document.getElementById(others[0]).value = r1;
            document.getElementById(others[1]).value = r2;
        }
        h = parseInt(document.getElementById('w-height').value);
        l = parseInt(document.getElementById('w-looks').value);
        j = parseInt(document.getElementById('w-job').value);
    }
    document.getElementById('w-height-pct').textContent = h + '%';
    document.getElementById('w-looks-pct').textContent  = l + '%';
    document.getElementById('w-job-pct').textContent    = j + '%';
    const finalTotal = h + l + j;
    const el = document.getElementById('weight-total');
    el.textContent = finalTotal + '%';
    el.className = 'weight-total-num ' + (finalTotal === 100 ? 'ok' : 'over');
}

function loadWeights(idealWeightsJson) {
    let w = { height:34, looks:33, job:33 };
    if (idealWeightsJson) { try { w = JSON.parse(idealWeightsJson); } catch {} }
    document.getElementById('w-height').value = w.height || 34;
    document.getElementById('w-looks').value  = w.looks  || 33;
    document.getElementById('w-job').value    = w.job    || 33;
    onWeightChange(null);
}

async function saveWeights() {
    let h = parseInt(document.getElementById('w-height').value);
    let l = parseInt(document.getElementById('w-looks').value);
    let j = parseInt(document.getElementById('w-job').value);
    const total = h + l + j;
    if (total === 0) { h = 34; l = 33; j = 33; }
    else if (total !== 100) {
        // 비율 유지하며 100으로 정규화
        const scale = 100 / total;
        h = Math.round(h * scale);
        l = Math.round(l * scale);
        j = 100 - h - l;
        document.getElementById('w-height').value = h;
        document.getElementById('w-looks').value  = l;
        document.getElementById('w-job').value    = j;
        onWeightChange(null);
    }
    const weightsJson = JSON.stringify({ height:h, looks:l, job:j });
    const { data: { user } } = await db.auth.getUser();
    const { error } = await db.from('applicants').update({ ideal_weights: weightsJson }).eq('user_id', user.id);
    if (error) { toast('저장 실패: ' + error.message, 'error'); return; }
    window._myProfile = { ...window._myProfile, ideal_weights: weightsJson };
    renderMatchRanking(window._allCandidates || []);
    const btn = document.getElementById('save-weights-btn');
    btn.textContent = '✅ 저장됨';
    setTimeout(() => { btn.textContent = '저장'; }, 1500);
}

    const filtered = candidates.filter(c => !blockedSet.has(c.id));
    _scoredCandidates = filtered.map(c => ({
        ...c,
        _score: calcMatchScore(window._myProfile, c),
        _mbtiCompat: calcMbtiCompat(window._myProfile.mbti, c.mbti),

    _scoredCandidates.sort((a, b) => b._score - a._score);

    const tags = [age ? `${age}세` : null, c.location, c.job_category].filter(Boolean);

    const popHtml = c._favCount > 0 ? `<span class="popularity-badge" style="margin-bottom:12px;"><i class="fa-solid fa-fire"></i> ${c._favCount}명이 관심을 보이고 있어요</span>` : '';
    const mutualCardHtml = isMutual ? `<div style="text-align:center;padding:10px;background:linear-gradient(135deg,#faf5ff,#fdf2f8);border-radius:12px;margin-bottom:12px;"><span class="mutual-badge" style="font-size:.85em;"><i class="fa-solid fa-heart-circle-bolt"></i> 이 사람도 당신에게 관심이 있어요!</span></div>` : '';

    sec.innerHTML = `
        <div class="card-view">
            <div class="profile-card" id="current-card">
                <div class="card-photo-area">
                    ${photoHtml}
                    <div class="card-photo-overlay">

                    </div>

                    <button class="card-btn card-btn-like" onclick="cardLike('${c.id}')" title="${isFav ? '이미 찜함' : '찜하기'}"><i class="fa-solid fa-heart"></i></button>
                </div>
            </div>
            <div class="card-counter"></div>

    // 스와이프 이벤트 바인딩
    setTimeout(initSwipe, 50);
}

// ── 터치 스와이프 ──
let _swipeStartX = 0, _swipeStartY = 0, _swiping = false;
function initSwipe() {
    const card = document.getElementById('current-card');
    if (!card) return;
    card.addEventListener('touchstart', e => {
        _swipeStartX = e.touches[0].clientX;
        _swipeStartY = e.touches[0].clientY;
        _swiping = true;
        card.style.transition = 'none';
    }, { passive: true });
    card.addEventListener('touchmove', e => {
        if (!_swiping) return;
        const dx = e.touches[0].clientX - _swipeStartX;
        const dy = e.touches[0].clientY - _swipeStartY;
        if (Math.abs(dx) < Math.abs(dy)) return; // 세로 스크롤 우선
        const rot = dx * 0.08;
        card.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
        card.style.opacity = Math.max(0.5, 1 - Math.abs(dx) / 400);
    }, { passive: true });
    card.addEventListener('touchend', e => {
        if (!_swiping) return;
        _swiping = false;
        const dx = e.changedTouches[0].clientX - _swipeStartX;
        card.style.transition = 'transform .3s, opacity .3s';
        if (dx > 80) {
            const c = _scoredCandidates[_cardIndex];
            if (c) cardLike(c.id);
        } else if (dx < -80) {
            cardPass();
        } else {
            card.style.transform = '';
            card.style.opacity = '1';
        }
    });
}

function cardPass() {
    if (_isCardAnimating) return;
    _isCardAnimating = true;
    const el = document.getElementById('current-card');
    if (el) { el.classList.add('swiping-left'); }
    _swipedCount++;
    saveDailySwipeCount();
    setTimeout(() => {
        _cardIndex++;
        _isCardAnimating = false;
        renderCardView(document.getElementById('match-ranking-section'), window._favSet || new Set());
    }, 280);
}

function cardLike(id) {
    if (_isCardAnimating) return;
    _isCardAnimating = true;
    const el = document.getElementById('current-card');
    if (el) { el.classList.add('swiping-right'); }
    _swipedCount++;
    saveDailySwipeCount();
    toggleFav(id);
    setTimeout(() => {
        _cardIndex++;
        _isCardAnimating = false;
        renderCardView(document.getElementById('match-ranking-section'), window._favSet || new Set());
    }, 280);
}

async function toggleFav(applicantId) {
    const { data: { user } } = await db.auth.getUser();
    const favSet = window._favSet || new Set();
    if (favSet.has(applicantId)) {
        await db.from('favorites').delete().eq('user_id', user.id).eq('applicant_id', applicantId);
        favSet.delete(applicantId);
        toast('찜 목록에서 제거했어요');
    } else {
        if (favSet.size >= 3) {
            toast('최대 3명까지만 찜할 수 있어요. 기존 찜을 해제해주세요.', 'warning');
            return;
        }
        await db.from('favorites').insert([{ user_id: user.id, applicant_id: applicantId }]);
        favSet.add(applicantId);
        toast(`찜 목록에 담았어요 (${favSet.size}/3)`, 'success');
    }
    window._favSet = favSet;
    renderMatchRanking(window._allCandidates || []);
    await loadFavorites(user.id);
    // 상호 관심 재확인
    await loadMutualInterests(user.id);
}

async function removeFav(applicantId) {
    const { data: { user } } = await db.auth.getUser();
    await db.from('favorites').delete().eq('user_id', user.id).eq('applicant_id', applicantId);
    toast('찜 목록에서 제거했어요');
    await loadFavorites(user.id);
    await loadMutualInterests(user.id);
}

// ── 나를 찜한 사람 ──

            <div style="font-size:.82em;color:var(--muted);margin-bottom:14px;">이 분들이 당신에게 관심을 보냈어요!</div>
            <div class="fav-list">${data.map(a => {

// ── 상호 관심 감지 & 매칭 신청 ──
async function loadMutualInterests(userId) {
    try {
        const { data: mutualIds } = await db.rpc('get_mutual_favorites', { my_user_id: userId });
        window._mutualSet = new Set(mutualIds || []);

        // 기존 매칭 요청 로드
        if (window._myProfile) {
            const { data: requests } = await db.from('match_requests')
                .select('to_applicant,status')
                .eq('from_applicant', window._myProfile.id);
            window._matchRequests = {};
            (requests || []).forEach(r => { window._matchRequests[r.to_applicant] = r.status; });
        }

        renderMutualSection();
        // 추천 목록에 상호 관심 배지 업데이트
        renderMatchRanking(window._allCandidates || []);
    } catch(e) {
        console.log('mutual interest load error:', e.message);
        window._mutualSet = new Set();
    }
}

function renderMutualSection() {
    const card = document.getElementById('mutual-card');
    const sec = document.getElementById('mutual-section');
    const mutualSet = window._mutualSet || new Set();
    const candidates = window._allCandidates || [];
    const mutuals = candidates.filter(c => mutualSet.has(c.id));

    if (mutuals.length === 0) { card.style.display = 'none'; return; }
    card.style.display = '';
    document.getElementById('mutual-count').textContent = '';

    sec.innerHTML = `
        <div style="font-size:.82em;color:var(--muted);margin-bottom:14px;">서로 관심을 보낸 상대예요! 매칭을 신청해보세요.</div>
        ${mutuals.map(c => {
            const age = calcAge(c.birth);
            const photo = c.photos && c.photos[0];
            const photoHtml = photo
                ? `<div class="match-photo"><img src="${photo}" alt=""></div>`
                : `<div class="match-photo">${c.gender === 'male' ? '<i class="fa-solid fa-mars" style="color:#3b82f6;"></i>' : '<i class="fa-solid fa-venus" style="color:#ec4899;"></i>'}</div>`;
            const tags = [age ? age + '세' : null, c.location, c.mbti, c.job_category].filter(Boolean)
                .map(t => `<span class="match-tag">${esc(t)}</span>`).join('');
            const reqStatus = (window._matchRequests || {})[c.id];
            let actionHtml;
            if (reqStatus === 'pending') {
                actionHtml = '<span class="btn-match-requested">신청됨 ⏳</span>';
            } else if (reqStatus === 'approved') {
                actionHtml = '<span class="btn-match-requested" style="border-color:#10b981;color:#10b981;">승인됨 ✅</span>';
            } else if (reqStatus === 'rejected') {
                actionHtml = '<span class="btn-match-requested" style="border-color:#ef4444;color:#ef4444;">거절됨</span>';
            } else {
                actionHtml = `<button class="btn-match-request" onclick="requestMatch('${c.id}')"><i class="fa-solid fa-heart-circle-bolt"></i> 매칭 신청</button>`;
            }
            return `<div class="mutual-item">
                ${photoHtml}
                <div class="match-info" style="flex:1;">
                    <div style="display:flex;align-items:center;gap:6px;">
                        <span class="mutual-badge"><i class="fa-solid fa-heart-circle-bolt"></i> 상호 관심</span>
                    </div>
                    <div class="match-tags">${tags}</div>
                </div>
                <div style="flex-shrink:0;">${actionHtml}</div>
            </div>`;
        }).join('')}`;
}

async function requestMatch(targetId) {
    if (!confirm('이 상대에게 매칭을 신청하시겠어요?')) return;
    try {
        const { data, error } = await db.rpc('create_match_request', { target_id: targetId });
        if (error) throw error;
        toast('매칭 신청이 완료됐어요! 관리자 승인을 기다려주세요.', 'success');
        // 요청 상태 업데이트
        if (!window._matchRequests) window._matchRequests = {};
        window._matchRequests[targetId] = 'pending';
        renderMutualSection();
    } catch(e) {
        toast('매칭 신청 실패: ' + e.message, 'error');
    }
}

async function loadFavorites(userId) {
    const { data: favs } = await db.from('favorites').select('applicant_id').eq('user_id', userId);
    window._favSet = new Set((favs || []).map(f => f.applicant_id));
    if (!favs || !favs.length) { renderFavorites([]); return; }
    const ids = favs.map(f => f.applicant_id);
    const { data: applicants } = await db.from('applicants')
        .select('id,gender,birth,job,location,mbti,photos,status')
        .in('id', ids);
    // 매칭/거절된 유저는 찜 목록에서 제외
    const visibleFavs = (applicants || []).filter(a => a.status === 'approved');
    renderFavorites(visibleFavs);
}

// ── 신고/차단 ──
async function reportUser(targetId) {
    const reasons = ['부적절한 사진','허위 프로필','불쾌한 행동','스팸/광고','기타'];
    const reason = prompt('신고 사유를 선택해주세요:\n' + reasons.map((r,i) => (i+1)+'. '+r).join('\n') + '\n\n번호를 입력하세요:');
    if (!reason) return;
    const idx = parseInt(reason) - 1;
    const reasonText = reasons[idx] || reason;
    if (!window._myProfile) return;
    try {
        await db.from('reports').insert([{ reporter_id: window._myProfile.id, target_id: targetId, reason: reasonText }]);
        toast('신고가 접수되었어요. 관리자가 확인할게요.');
        closeProfileModal();
    } catch(e) { toast('신고 실패', 'error'); }
}

async function blockUser(targetId) {
    if (!confirm('이 사용자를 차단하시겠어요?\n차단하면 서로 추천 목록에서 보이지 않아요.')) return;
    if (!window._myProfile) return;
    try {
        await db.from('blocks').insert([{ blocker_id: window._myProfile.id, blocked_id: targetId }]);
        if (!window._blockedSet) window._blockedSet = new Set();
        window._blockedSet.add(targetId);
        toast('차단되었어요');
        closeProfileModal();
        renderMatchRanking(window._allCandidates || []);
    } catch(e) { toast('차단 실패', 'error'); }
}

// ── 매칭 메시지 ──
async function loadMatchMessages(myAppId, partnerAppId) {
    if (!myAppId || !partnerAppId) return;
    const el = document.getElementById('match-messages');
    if (!el) return;
    try {
        const { data } = await db.from('messages')
            .select('*')
            .or(`and(from_applicant.eq.${myAppId},to_applicant.eq.${partnerAppId}),and(from_applicant.eq.${partnerAppId},to_applicant.eq.${myAppId})`)
            .order('created_at', { ascending: true })
            .limit(50);
        if (!data || data.length === 0) {
            el.innerHTML = '<div style="text-align:center;padding:12px;color:#d1d5db;font-size:.82em;">아직 대화가 없어요. 첫 인사를 보내보세요!</div>';
            return;
        }
        el.innerHTML = data.map(m => {
            const isMine = m.from_applicant === myAppId;
            return `<div style="display:flex;${isMine?'justify-content:flex-end':'justify-content:flex-start'};margin-bottom:8px;">
                <div style="max-width:75%;padding:10px 14px;border-radius:${isMine?'14px 14px 4px 14px':'14px 14px 14px 4px'};background:${isMine?'linear-gradient(135deg,#7c3aed,#ec4899)':'#f3f4f6'};color:${isMine?'white':'var(--text)'};font-size:.88em;">
                    ${esc(m.content)}
                    <div style="font-size:.65em;margin-top:4px;opacity:.7;text-align:right;">${formatTimeAgo(m.created_at)}</div>
                </div>
            </div>`;
        }).join('');
        el.scrollTop = el.scrollHeight;
    } catch(e) { console.log('msg load error:', e.message); }
}

async function sendMatchMsg() {
    const input = document.getElementById('match-msg-input');
    if (!input) return;
    const content = input.value.trim();
    if (!content) return;
    if (!window._myProfile || !partner_id_for_msg) return;
    input.value = '';
    try {
        await db.from('messages').insert([{
            from_applicant: window._myProfile.id,
            to_applicant: partner_id_for_msg,
            content: content
        }]);
        await loadMatchMessages(window._myProfile.id, partner_id_for_msg);
    } catch(e) { toast('메시지 전송 실패', 'error'); }
}

// ── 프로필 상세 모달 ──

           || (window._allCandidates || []).find(x => x.id === applicantId)
           || (window._likedMeData || []).find(x => x.id === applicantId);

            <div class="pm-section">
                <div class="pm-tags">${tags.map(t => `<span class="pm-tag">${esc(t)}</span>`).join('')}</div>
            </div>
            <div class="pm-section">
                <div class="pm-section-title">궁합</div>
                <div class="pm-compat">
                    <div class="pm-compat-score">${compat}%</div>
                    <div style="flex:1;">
                        <div class="pm-compat-bar"><div class="pm-compat-fill" style="width:${compat}%"></div></div>
                        <div style="font-size:.72em;color:var(--muted);margin-top:4px;">MBTI ${mbtiLabel} (${mbtiCompat}%)</div>

                </div>

        <div class="pm-actions">
            <button class="btn ${isFav ? 'btn-outline' : 'btn-primary'}" onclick="toggleFav('${c.id}');closeProfileModal();">${isFav ? '💜 찜 해제' : '🤍 찜하기'}</button>
            <button class="btn btn-outline" onclick="closeProfileModal()">닫기</button>
        </div>
        <div style="text-align:center;padding:8px 20px 16px;border-top:1px solid #f3f4f6;">
            <button onclick="reportUser('${c.id}')" style="background:none;border:none;cursor:pointer;font-size:.75em;color:#d1d5db;">신고</button>
            <span style="color:#e5e7eb;margin:0 8px;">|</span>
            <button onclick="blockUser('${c.id}')" style="background:none;border:none;cursor:pointer;font-size:.75em;color:#d1d5db;">차단</button>
        </div>`;
    document.getElementById('profile-modal').classList.add('open');
}

function closeProfileModal() {
    document.getElementById('profile-modal').classList.remove('open');
}

// ESC로 모달 닫기
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        closeProfileModal();
        closeNotifPanel();
    }
});

// ── 알림 시스템 ──
let _notifications = [];
async function loadNotifications() {
    try {
        const { data } = await db.from('notifications')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(30);
        const prev = _notifications.filter(n => !n.is_read).length;
        _notifications = data || [];
        const curr = _notifications.filter(n => !n.is_read).length;
        renderNotifBadge();
        renderNotifList();
        // 새 알림이 있으면 브라우저 알림
        if (curr > prev && curr > 0) {
            const newest = _notifications.find(n => !n.is_read);
            if (newest) showBrowserNotif(newest.title, newest.body);
        }
    } catch(e) { console.log('notif load error:', e.message); }
}

// 브라우저 알림
function requestNotifPermission() {
    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }
}
function showBrowserNotif(title, body) {
    if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, { body: body || '', icon: '💎', tag: 'banjjok' });
    }
}

function renderNotifBadge() {
    const unread = _notifications.filter(n => !n.is_read).length;
    const badge = document.getElementById('notif-badge');
    if (unread > 0) {
        badge.style.display = 'flex';
        badge.textContent = unread > 9 ? '9+' : unread;
    } else {
        badge.style.display = 'none';
    }
}

function renderNotifList() {
    const list = document.getElementById('notif-list');
    if (_notifications.length === 0) {
        list.innerHTML = '<div class="notif-empty">아직 알림이 없어요</div>';
        return;
    }
    const icons = { interest:'<i class="fa-solid fa-heart" style="color:#7c3aed;"></i>', matched:'<i class="fa-solid fa-heart-pulse" style="color:#ec4899;"></i>', approved:'<i class="fa-solid fa-circle-check" style="color:#10b981;"></i>', mutual:'<i class="fa-solid fa-heart-circle-bolt" style="color:#ec4899;"></i>', rejected:'<i class="fa-solid fa-circle-xmark" style="color:#ef4444;"></i>' };
    list.innerHTML = _notifications.map(n => {
        const icon = icons[n.type] || '🔔';
        const timeAgo = formatTimeAgo(n.created_at);
        return `<div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="readNotif(${n.id})">
            <div class="notif-icon">${icon}</div>
            <div class="notif-body">
                <div class="notif-title">${esc(n.title)}</div>
                ${n.body ? `<div class="notif-desc">${esc(n.body)}</div>` : ''}
                <div class="notif-time">${timeAgo}</div>
            </div>
        </div>`;
    }).join('');
}

function formatTimeAgo(iso) {
    const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (diff < 60) return '방금 전';
    if (diff < 3600) return Math.floor(diff / 60) + '분 전';
    if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
    if (diff < 604800) return Math.floor(diff / 86400) + '일 전';
    return new Date(iso).toLocaleDateString('ko-KR');
}

function toggleNotifPanel() {
    const panel = document.getElementById('notif-panel');
    const backdrop = document.getElementById('notif-backdrop');
    const isOpen = panel.classList.contains('open');
    panel.classList.toggle('open', !isOpen);
    backdrop.classList.toggle('open', !isOpen);
}

function closeNotifPanel() {
    document.getElementById('notif-panel').classList.remove('open');
    document.getElementById('notif-backdrop').classList.remove('open');
}

async function readNotif(id) {
    await db.from('notifications').update({ is_read: true }).eq('id', id);
    const n = _notifications.find(x => x.id === id);
    if (n) n.is_read = true;
    renderNotifBadge();
    renderNotifList();
    closeNotifPanel();
}

async function markAllRead() {
    const unreadIds = _notifications.filter(n => !n.is_read).map(n => n.id);
    if (unreadIds.length === 0) return;
    for (const id of unreadIds) {
        await db.from('notifications').update({ is_read: true }).eq('id', id);
    }
    _notifications.forEach(n => n.is_read = true);
    renderNotifBadge();
    renderNotifList();
    toast('모든 알림을 읽었어요');
}

async function doLogout() {
    if (!confirm('로그아웃 하시겠습니까?')) return;
    await db.auth.signOut();
    localStorage.removeItem('kj_role');
    localStorage.removeItem('kj_screen');
    window.location.href = 'index.html';
}

// ── 축하 confetti ──
function showConfetti() {
    const container = document.createElement('div');
    container.className = 'confetti-container';
    document.body.appendChild(container);
    const colors = ['#7c3aed','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444'];
    for (let i = 0; i < 60; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + '%';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDelay = Math.random() * 2 + 's';
        c.style.animationDuration = (2 + Math.random() * 2) + 's';
        c.style.width = (6 + Math.random() * 8) + 'px';
        c.style.height = (6 + Math.random() * 8) + 'px';
        container.appendChild(c);
    }
    setTimeout(() => container.remove(), 5000);
}

// ── 매칭 상대 정보 표시 ──
function renderMatchResult(partner) {
    const card = document.getElementById('match-result-card');
    const sec = document.getElementById('match-result-section');
    if (!partner) { card.style.display = 'none'; return; }
    card.style.display = '';
    partner_id_for_msg = partner.id;
    if (!window._confettiShown) { window._confettiShown = true; setTimeout(showConfetti, 500); }
    const age = calcAge(partner.birth);
    const photo = partner.photos && partner.photos[0];
    const photoHtml = photo
        ? `<img src="${photo}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">`
        : `<div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#ede9fe,#fce7f3);display:flex;align-items:center;justify-content:center;font-size:36px;">${partner.gender === 'male' ? '<i class="fa-solid fa-mars" style="color:#3b82f6;"></i>' : '<i class="fa-solid fa-venus" style="color:#ec4899;"></i>'}</div>`;
    sec.innerHTML = `
        <div style="text-align:center;padding:8px 0;">
            <div style="font-size:1.1em;font-weight:800;color:var(--primary);margin-bottom:16px;">축하합니다! 반쪽을 찾았어요</div>
            <div style="display:flex;justify-content:center;margin-bottom:16px;">${photoHtml}</div>
            <div style="font-size:1em;font-weight:700;margin-bottom:4px;">${esc(partner.name)}</div>
            <div style="font-size:.88em;color:var(--muted);margin-bottom:12px;">${age ? age + '세' : ''} · ${esc(partner.job || '')}${partner.location ? ' · ' + esc(partner.location) : ''}</div>
            ${partner.kakao ? `<div style="background:#FEE500;color:#3C1E1E;padding:10px 20px;border-radius:12px;font-weight:700;font-size:.9em;display:inline-block;">💛 카카오 ID: ${esc(partner.kakao)}</div>` : ''}
            ${partner.contact ? `<div style="margin-top:8px;font-size:.85em;color:var(--muted);">연락처: ${esc(partner.contact)}</div>` : ''}
            <div id="match-messages" style="margin-top:20px;text-align:left;"></div>
            <div style="margin-top:12px;display:flex;gap:8px;">
                <input type="text" id="match-msg-input" placeholder="첫 인사를 보내보세요..." style="flex:1;padding:10px 14px;border:2px solid var(--border);border-radius:12px;font-size:.9em;font-family:inherit;" onkeydown="if(event.key==='Enter')sendMatchMsg()">
                <button class="btn btn-primary" onclick="sendMatchMsg()" style="padding:10px 18px;flex-shrink:0;">보내기</button>
            </div>
        </div>`;
    loadMatchMessages(window._myProfile.id, partner_id_for_msg);
}
let partner_id_for_msg = null;

async function init() {
    try {
    const { data: { session } } = await db.auth.getSession();
    if (!session) { setLoading(false); window.location.href = 'index.html'; return; }

    const user = session.user;
    document.getElementById('user-email').textContent = user.email;

    // 내 신청서 조회
    const { data: profiles } = await db.from('applicants')
        .select('*').eq('user_id', user.id).limit(1);
    const profile = profiles && profiles[0] ? profiles[0] : null;
    window._popularityCount = 0;
    window._favCounts = {};
    renderProfile(profile);
    window._myProfile = profile;

    const isMatched = profile && profile.status === 'matched';
    const isApproved = profile && profile.status === 'approved';

    if (profile) {
        // 이성 승인 참가자 로드 (온보딩에서도 숫자 필요)
        const oppGender = profile.gender === 'male' ? 'female' : 'male';
        const { data: candidates } = await db.from('applicants')
            .select('id,gender,birth,job,job_category,height,look_score,location,mbti,photos,icebreaker')
            .eq('status', 'approved')
            .eq('gender', oppGender);
        window._allCandidates = candidates || [];

        // 상태별 온보딩 화면
        if (!isMatched) {
            showOnboarding(profile.status, (candidates || []).length);
        }

        // 승인된 상태에서만 추천/가중치 표시
        const showRecommendations = isApproved;
        document.getElementById('weights-card').style.display = showRecommendations ? '' : 'none';
        if (showRecommendations) loadWeights(profile.ideal_weights);

        // 나를 찜한 사람 수 (아만다 스타일 인기도) — RPC로 RLS 우회
        const { data: myPop } = await db.rpc('get_my_popularity', { my_applicant_id: profile.id });
        window._popularityCount = myPop || 0;

        // 각 후보의 찜 받은 수 (인기도) — RPC로 RLS 우회
        const candIds = (candidates || []).map(c => c.id);
        if (candIds.length > 0) {
            const { data: favCountData } = await db.rpc('get_favorite_counts', { ids: candIds });
            window._favCounts = favCountData || {};
        }

        if (showRecommendations) {
            // 상호 관심 + 나를 찜한 사람 로드
            await loadMutualInterests(user.id);
            await loadWhoLikedMe();
        }

        // 프로필 다시 렌더 (인기도 포함)
        renderProfile(profile);
        if (showRecommendations) {
            _cardIndex = 0;
            _swipedCount = loadDailySwipeCount();
            renderMatchRanking(window._allCandidates);
        }

        // 매칭 성사 확인 → 상대방 정보 표시
        if (isMatched && profile.matched_with) {
            try {
                const { data: partners } = await db.from('applicants')
                    .select('id,name,gender,birth,job,location,kakao,contact,photos')
                    .eq('id', profile.matched_with).limit(1);
                if (partners && partners[0]) renderMatchResult(partners[0]);
            } catch(e) { console.log('match partner load error:', e.message); }
        }
    }

    if (!isMatched) {
        await loadFavorites(user.id);
    } else {
        // 매칭된 후에는 찜 목록/추천 숨김
        document.getElementById('match-ranking-card').style.display = 'none';
        document.getElementById('mutual-card').style.display = 'none';
    }
    // 브라우저 알림 권한 요청
    requestNotifPermission();
    // 차단 목록 로드
    if (window._myProfile) {
        try {
            const { data: blockData } = await db.from('blocks').select('blocked_id').eq('blocker_id', window._myProfile.id);
            window._blockedSet = new Set((blockData || []).map(b => b.blocked_id));
        } catch(e) { window._blockedSet = new Set(); }
    }
    // 알림 로드
    await loadNotifications();
    setLoading(false);
    } catch(e) {
        console.error('dashboard init error:', e);
        setLoading(false);
        toast('데이터 로드 중 오류가 발생했어요. 새로고침해주세요.', 'error');
    }
}

init();
</script>
